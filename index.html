<div class="app-container">

<script>
    // ===================== Supabase 配置（已更新密钥为最新格式）=====================
    const SUPABASE_URL = 'https://jwpaauzedazirdqjaycx.supabase.co/rest/v1/';

    // 关键改动：使用 sbClient 作为变量名，彻底避开任何全局冲突
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 全局数据
    let goods = [];
    let currentSearch = "";
    let currentCategory = "全部";

    // ---------- 拼音搜索辅助 ----------
    function getPinyinInitials(str) {
        if (!str) return "";
        try {
            const { pinyin } = window.pinyinPro;
            return pinyin(str, { toneType: 'none', type: 'array' }).map(w => w[0].toLowerCase()).join('');
        } catch(e) {
            return str.toLowerCase();
        }
    }

    function matchSearch(item) {
        if (!currentSearch) return true;
        const kw = currentSearch.toLowerCase();
        if (item.name.toLowerCase().includes(kw)) return true;
        if (getPinyinInitials(item.name).includes(kw)) return true;
        return false;
    }

    function computeValue(g) {
        return (g.wholeQty * g.wholePrice) + (g.pieceQty * g.piecePrice);
    }

    function isChecked(g) {
        return (g.wholeQty + g.pieceQty) > 0;
    }

    function getFilteredAndSorted() {
        let filtered = goods.filter(g => (currentCategory === "全部" || g.category === currentCategory) && matchSearch(g));
        filtered.sort((a,b) => (isChecked(b) - isChecked(a)) || a.id - b.id);
        return filtered;
    }

    // ---------- 云数据库操作 ----------
    async function loadDataFromServer() {
        updateSyncStatus('⏳ 加载数据中...');
        const { data, error } = await sbClient
            .from('goods')
            .select('*')
            .order('id', { ascending: true });

        if (error) {
            console.error('加载失败', error);
            updateSyncStatus('❌ 加载失败，请刷新重试');
            goods = [];
            renderCards();
            return;
        }

        // 字段映射
        goods = data.map(row => ({
            id: row.id,
            category: row.category,
            name: row.name,
            spec: row.spec || '',
            unit: row.unit || '',
            wholePrice: Number(row.whole_price),
            wholeQty: Number(row.whole_qty),
            piecePrice: Number(row.piece_price),
            pieceQty: Number(row.piece_qty),
        }));
        updateSyncStatus('✅ 已同步');
        renderCards();

        // 首次使用，数据库为空，自动初始化基础数据
        if (goods.length === 0) {
            await initializeBaseData();
        }
    }

    async function initializeBaseData() {
        updateSyncStatus('⏳ 首次使用，正在初始化基础数据...');
        const baseData = buildInitialData().map(g => ({
            category: g.category,
            name: g.name,
            spec: g.spec,
            unit: g.unit,
            whole_price: g.wholePrice,
            whole_qty: g.wholeQty,
            piece_price: g.piecePrice,
            piece_qty: g.pieceQty,
            // id 由数据库自动生成
        }));

        // 分批插入
        const chunkSize = 100;
        for (let i = 0; i < baseData.length; i += chunkSize) {
            const chunk = baseData.slice(i, i + chunkSize);
            const { error } = await sbClient.from('goods').insert(chunk);
            if (error) {
                console.error('初始化数据失败', error);
                updateSyncStatus('❌ 初始化失败，请检查数据库配置');
                return;
            }
        }

        updateSyncStatus('✅ 基础数据已就绪');
        await loadDataFromServer(); // 重新加载，获取带 id 的数据
    }

    async function saveGoodsToServer(g) {
        const { data: existing } = await sbClient
            .from('goods')
            .select('id')
            .eq('id', g.id)
            .maybeSingle();

        const payload = {
            category: g.category,
            name: g.name,
            spec: g.spec,
            unit: g.unit,
            whole_price: g.wholePrice,
            whole_qty: g.wholeQty,
            piece_price: g.piecePrice,
            piece_qty: g.pieceQty,
        };

        if (existing) {
            const { error } = await sbClient
                .from('goods')
                .update(payload)
                .eq('id', g.id);
            if (error) throw error;
        } else {
            // 新增时显式指定 id
            const { error } = await sbClient
                .from('goods')
                .insert({ ...payload, id: g.id });
            if (error) throw error;
        }
    }

    async function deleteGoodsFromServer(ids) {
        const { error } = await sbClient
            .from('goods')
            .delete()
            .in('id', ids);
        if (error) throw error;
    }

    async function deleteAllGoods() {
        const { error } = await sbClient
            .from('goods')
            .delete()
            .neq('id', 0);
        if (error) throw error;
    }

    async function batchInsertGoods(rows) {
        const chunkSize = 100;
        for (let i = 0; i < rows.length; i += chunkSize) {
            const chunk = rows.slice(i, i + chunkSize);
            const { error } = await sbClient.from('goods').insert(chunk);
            if (error) throw error;
        }
    }

    function updateSyncStatus(text) {
        const el = document.getElementById('syncStatus');
        if (el) el.textContent = text;
    }

    // ---------- UI 渲染 ----------
    function updateStats() {
        let total = 0, foodTotal = 0, supplyTotal = 0, checkedCount = 0;
        goods.forEach(g => {
            const val = computeValue(g);
            total += val;
            if (g.category === '酒水食材') foodTotal += val;
            else if (g.category === '易耗品') supplyTotal += val;
            if (g.wholeQty + g.pieceQty > 0) checkedCount++;
        });
        document.getElementById('totalValue').innerHTML = `¥${total.toFixed(2)}`;
        document.getElementById('foodValue').innerHTML = `¥${foodTotal.toFixed(2)}`;
        document.getElementById('supplyValue').innerHTML = `¥${supplyTotal.toFixed(2)}`;
        document.getElementById('countStats').innerHTML = `${checkedCount} / ${goods.length}`;
    }

    function renderCards() {
        const container = document.getElementById('cardsContainer');
        const filtered = getFilteredAndSorted();
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-placeholder">📭 没有找到相关商品，试试其他关键词</div>';
            updateStats();
            return;
        }
        container.innerHTML = filtered.map(g => {
            const totalVal = computeValue(g);
            const hasStock = isChecked(g);
            const priceText = `整箱 ¥${g.wholePrice.toFixed(2)} / 散 ¥${g.piecePrice.toFixed(2)}`;
            const specText = g.spec ? `${g.spec} | 单位：${g.unit}` : `单位：${g.unit}`;
            const statusText = hasStock ? `📦 整件:${g.wholeQty}  🔸 零散:${g.pieceQty}` : "待盘点";
            return `
                <div class="goods-card" data-id="${g.id}">
                    <div class="card-checkbox"><input type="checkbox" class="goods-checkbox" value="${g.id}"></div>
                    <div class="card-icon">${g.category === '酒水食材' ? '🍷' : '🧻'}</div>
                    <div class="card-info">
                        <div class="card-title">${escapeHtml(g.name)}</div>
                        <div class="card-spec">${escapeHtml(specText)}</div>
                        <div class="price-row">💰 ${priceText}</div>
                        <div class="stock-summary">
                            <span class="stock-badge ${!hasStock ? 'pending-badge' : ''}">${statusText}</span>
                            <span class="total-value">¥${totalVal.toFixed(2)}</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        document.querySelectorAll('.goods-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if(e.target.type !== 'checkbox') openEditModal(parseInt(card.dataset.id));
            });
        });
        updateStats();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m);
    }

    // ---------- 模态框：编辑商品 ----------
    function openEditModal(id) {
        const goodsItem = goods.find(g => g.id === id);
        if (!goodsItem) return;
        const modalDiv = document.createElement('div'); modalDiv.className = 'modal-mask';
        modalDiv.innerHTML = `
            <div class="modal-card">
                <h3>📝 盘点录入 / 编辑</h3>
                <div class="form-row"><label>品名</label><input id="modalName" value="${escapeHtml(goodsItem.name)}" readonly style="background:#f3f4f6;"></div>
                <div class="form-row"><label>规格</label><input id="modalSpec" value="${escapeHtml(goodsItem.spec)}" placeholder="规格"></div>
                <div class="double-group">
                    <div class="form-row"><label>整件单价 (¥)</label><input id="modalWholePrice" type="number" step="any" value="${goodsItem.wholePrice}"></div>
                    <div class="form-row"><label>零散单价 (¥)</label><input id="modalPiecePrice" type="number" step="any" value="${goodsItem.piecePrice}"></div>
                </div>
                <div class="double-group">
                    <div class="form-row"><label>整件数量</label><input id="modalWholeQty" type="number" step="any" value="${goodsItem.wholeQty}"></div>
                    <div class="form-row"><label>零散数量</label><input id="modalPieceQty" type="number" step="any" value="${goodsItem.pieceQty}"></div>
                </div>
                <div class="modal-actions">
                    <button id="modalSaveBtn" style="background:#2c3e2f;">✅ 保存盘点</button>
                    <button id="modalDeleteBtn" class="delete-goods-btn">🗑️ 删除商品</button>
                    <button id="modalCancelBtn" class="secondary">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);

        const saveBtn = modalDiv.querySelector('#modalSaveBtn');
        const deleteBtn = modalDiv.querySelector('#modalDeleteBtn');
        const cancelBtn = modalDiv.querySelector('#modalCancelBtn');

        saveBtn.onclick = async () => {
            const newWholePrice = parseFloat(modalDiv.querySelector('#modalWholePrice').value) || 0;
            const newPiecePrice = parseFloat(modalDiv.querySelector('#modalPiecePrice').value) || 0;
            const priceChanged = (newWholePrice !== goodsItem.wholePrice) || (newPiecePrice !== goodsItem.piecePrice);
            if (priceChanged && !confirm("⚠️ 单价已修改，是否保存并更新库存价值？")) return;

            goodsItem.spec = modalDiv.querySelector('#modalSpec').value;
            goodsItem.wholePrice = newWholePrice;
            goodsItem.wholeQty = parseFloat(modalDiv.querySelector('#modalWholeQty').value) || 0;
            goodsItem.piecePrice = newPiecePrice;
            goodsItem.pieceQty = parseFloat(modalDiv.querySelector('#modalPieceQty').value) || 0;

            try {
                updateSyncStatus('⏳ 保存中...');
                await saveGoodsToServer(goodsItem);
                updateSyncStatus('✅ 已保存');
                renderCards();
                modalDiv.remove();
            } catch (e) {
                alert('保存失败：' + e.message);
                updateSyncStatus('❌ 保存失败');
            }
        };

        deleteBtn.onclick = async () => {
            if (confirm(`彻底删除「${goodsItem.name}」？`)) {
                try {
                    updateSyncStatus('⏳ 删除中...');
                    await deleteGoodsFromServer([goodsItem.id]);
                    goods = goods.filter(g => g.id !== goodsItem.id);
                    updateSyncStatus('✅ 已删除');
                    renderCards();
                    modalDiv.remove();
                } catch (e) {
                    alert('删除失败：' + e.message);
                    updateSyncStatus('❌ 删除失败');
                }
            }
        };

        cancelBtn.onclick = () => modalDiv.remove();
        modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) modalDiv.remove(); });
    }

        const cancelBtn = modalDiv.querySelector('#modalCancelBtn');

        confirmBtn.onclick = async () => {
            const name = modalDiv.querySelector('#modalName').value.trim();
            if (!name) { alert("请填写品名"); return; }

            const newId = goods.length > 0 ? Math.max(...goods.map(g => g.id)) + 1 : 1;
            const newGoods = {
                id: newId,
                category: modalDiv.querySelector('#modalCategory').value,
                name: name,
                spec: modalDiv.querySelector('#modalSpec').value,
                unit: modalDiv.querySelector('#modalUnit').value || "件",
                wholePrice: parseFloat(modalDiv.querySelector('#modalWholePrice').value) || 0,
                wholeQty: parseFloat(modalDiv.querySelector('#modalWholeQty').value) || 0,
                piecePrice: parseFloat(modalDiv.querySelector('#modalPiecePrice').value) || 0,
                pieceQty: parseFloat(modalDiv.querySelector('#modalPieceQty').value) || 0,
            };

            try {
                updateSyncStatus('⏳ 添加中...');
                await saveGoodsToServer(newGoods);
                goods.push(newGoods);
                updateSyncStatus('✅ 已添加');
                renderCards();
                modalDiv.remove();
            } catch (e) {
                alert('添加失败：' + e.message);
                updateSyncStatus('❌ 添加失败');
            }
        };

        cancelBtn.onclick = () => modalDiv.remove();
        modalDiv.addEventListener('click', (e) => { if (e.target === modalDiv) modalDiv.remove(); });
    }

    // ---------- 批量操作 ----------
    function toggleSelectAll() {
        const cbs = document.querySelectorAll('.goods-checkbox');
        const allChecked = Array.from(cbs).every(cb => cb.checked);
        cbs.forEach(cb => cb.checked = !allChecked);
    }

    async function batchDeleteSelected() {
        const checkedBoxes = document.querySelectorAll('.goods-checkbox:checked');
        if (checkedBoxes.length === 0) return alert("未选中任何商品");
        const ids = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
        if (confirm(`删除 ${ids.length} 个选中的商品？`)) {
            try {
                updateSyncStatus('⏳ 删除中...');
                await deleteGoodsFromServer(ids);
                goods = goods.filter(g => !ids.includes(g.id));
                updateSyncStatus('✅ 已删除');
                renderCards();
            } catch (e) {
                alert('批量删除失败：' + e.message);
                updateSyncStatus('❌ 删除失败');
            }
        }
    }

    async function resetAllQty() {
        if (confirm('重置所有商品的盘点数量（整件+零散归零）？')) {
            try {
                updateSyncStatus('⏳ 重置中...');
                const { error } = await sbClient
                    .from('goods')
                    .update({ whole_qty: 0, piece_qty: 0 })
                    .neq('id', 0);
                if (error) throw error;
                goods.forEach(g => { g.wholeQty = 0; g.pieceQty = 0; });
                updateSyncStatus('✅ 已重置');
                renderCards();
            } catch (e) {
                alert('重置失败：' + e.message);
                updateSyncStatus('❌ 重置失败');
            }
        }
    }

    // ---------- 导入导出 ----------
    function exportToExcel() {
        const wsData = [["序号","分类","品名","规格","单位","整件单价","整件数量","零散单价","零散数量","库存价值"]];
        goods.forEach((g,idx) => wsData.push([idx+1, g.category, g.name, g.spec, g.unit, g.wholePrice, g.wholeQty, g.piecePrice, g.pieceQty, computeValue(g)]));
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "跟斗九盘点");
        XLSX.writeFile(wb, `跟斗九_盘点_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    async function importFromExcel(file) {
        const reader = new FileReader();
        reader.onload = async function(evt) {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
            if (rows.length < 2) return alert("无数据");
            const newGoodsRaw = [];
            for (let i=1; i<rows.length; i++) {
                const r = rows[i];
                if (!r[2]) continue;
                newGoodsRaw.push({
                    category: r[1] || "酒水食材",
                    name: r[2],
                    spec: r[3] || "",
                    unit: r[4] || "",
                    whole_price: parseFloat(r[5]) || 0,
                    whole_qty: parseFloat(r[6]) || 0,
                    piece_price: parseFloat(r[7]) || 0,
                    piece_qty: parseFloat(r[8]) || 0,
                });
            }
            if (newGoodsRaw.length === 0) return;
            if (!confirm(`将用导入的 ${newGoodsRaw.length} 条数据替换当前全部数据，确定继续？`)) return;

            try {
                updateSyncStatus('⏳ 导入中（先清空再写入）...');
                await deleteAllGoods();
                await batchInsertGoods(newGoodsRaw);
                updateSyncStatus('✅ 导入成功');
                await loadDataFromServer();
            } catch (e) {
                alert('导入失败：' + e.message);
                updateSyncStatus('❌ 导入失败');
            }
        };
        reader.readAsArrayBuffer(file);
    }

    // ---------- 事件绑定 ----------
    document.getElementById('addGoodsBtn').onclick = () => showAddGoodsModal();
    document.getElementById('selectAllBtn').onclick = () => toggleSelectAll();
    document.getElementById('batchDeleteBtn').onclick = () => batchDeleteSelected();
    document.getElementById('resetQtyBtn').onclick = () => resetAllQty();
    document.getElementById('exportExcelBtn').onclick = () => exportToExcel();
    document.getElementById('importExcelBtn').onclick = () => document.getElementById('importFileInput').click();
    document.getElementById('importFileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) importFromExcel(file);
        e.target.value = '';
    };
    document.getElementById('searchInput').addEventListener('input', (e) => { currentSearch = e.target.value; renderCards(); });

    const tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(btn => btn.addEventListener('click', () => {
        tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.getAttribute('data-filter');
        renderCards();
    }));

    // ---------- 启动 ----------
    window.addEventListener('load', async () => {
        await loadDataFromServer();
    });
</script>
</body>
</html>
